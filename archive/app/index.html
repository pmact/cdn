<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dynamic Application</title>
    <meta charset="UTF-8">
	<style>body { margin: 0; padding: 0; background-color: #3498db; }</style>
</head>
<body>
	<script>
		window.addEventListener('message', function(event) {
			document.getElementById('root').innerHTML = document.getElementById('root').innerHTML + '<br />' + event.data;
		}, false);
	</script>
	<div id="root"></div>
</body>
</html>
